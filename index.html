<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lojinha Meow</title>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: linear-gradient(270deg, #1D0046, #5B00FF, #1D0046);
    background-size: 500% 500%;
    animation: bgMove 10s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.card {
    background: linear-gradient(
        180deg,
        rgba(15, 0, 40, 0.75),
        rgba(25, 0, 65, 0.85)
    );
    backdrop-filter: blur(22px);
    border-radius: 24px;
    padding: 30px 28px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    box-shadow:
        0 0 20px rgba(0, 0, 0, 0.6),
        0 0 50px rgba(91, 0, 255, 0.6);
    animation: fadeUp 1.2s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo img {
    width: 130px;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 12px rgba(143, 76, 255, 0.8));
}

h1 {
    font-size: 1.8rem;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 0.95rem;
    opacity: 0.9;
    margin-bottom: 25px;
}

.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    margin: 16px 0;
    border-radius: 16px;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: bold;
    color: #fff;

    background: linear-gradient(135deg, #7A2CFF, #A066FF);

    box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.15),
        0 0 18px rgba(160, 102, 255, 0.9),
        0 0 35px rgba(122, 44, 255, 0.8);

    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.btn i {
    font-size: 1.25rem;
}

.btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.15);
    opacity: 0;
    transition: 0.3s;
}

.btn:hover::after {
    opacity: 1;
}

.btn:hover {
    transform: scale(1.07);
    box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.3),
        0 0 30px rgba(255, 255, 255, 0.4),
        0 0 60px rgba(160, 102, 255, 1);
}

.btn.iptv {
    background: linear-gradient(135deg, #00D9FF, #5B00FF);
    box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.2),
        0 0 18px rgba(0, 217, 255, 0.8),
        0 0 35px rgba(91, 0, 255, 0.7);
}

footer {
    margin-top: 22px;
    font-size: 0.75rem;
    opacity: 0.75;
}
</style>
</head>

<body>

<div class="card">

    <!-- 🐱 LOGO -->
    <div class="logo">
        <img src="LogoMeow.png" alt="Meow Logo">
    </div>

    <h1>Lojinha Meow</h1>
    <div class="subtitle">
        Escolha um de nossos serviços para testar ou contratar 🚀
    </div>

    <!-- 🔐 VPN -->
    <a href="https://painel.meowssh.shop/public/vendas.php?ref=d7729b71bb5608101efad5358e6d71b1" class="btn">
        <i class="bi bi-globe"></i>
        Internet VPN
    </a>

    <!-- 📺 IPTV -->
    <a href="https://wa.me/5591991782362?text=Olá, gostaria de testar os Canais, Filmes e Séries" class="btn iptv">
        <i class="bi bi-tv"></i>
        Canais, Filmes e Séries
    </a>

    <footer>
        © <span id="year"></span> • Meow 😻
    </footer>

</div>

<script>
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
